# BitBeast theme state
source = ~/.config/bitbeast/current.conf
source = ~/.config/hypr/bitbeast-theme.conf

monitor = ,preferred,auto,1

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

$mod = SUPER
$terminal = kitty
$browser = firefox
$menu = rofi -show drun -config ~/.config/rofi/config.rasi
$bitbeast = ~/.local/bin/bitbeast

exec-once = waybar
exec-once = $bitbeast session-init
workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true
workspace = 6, persistent:true
workspace = 7, persistent:true
workspace = 8, persistent:true

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
}

general {
    gaps_in = 6
    gaps_out = 12
    layout = dwindle
    allow_tearing = false
}

dwindle {
    pseudotile = true
    preserve_split = true
}

layerrule = blur, rofi
layerrule = ignorealpha 0.1, rofi
layerrule = blur, waybar
layerrule = ignorealpha 0.1, waybar

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

bind = $mod, Return, exec, $terminal
bind = $mod, q, killactive
bind = $mod, f, fullscreen
bind = $mod, space, togglefloating
bind = $mod, r, exec, $menu
bind = $mod, w, exec, $bitbeast pick
bind = $mod, b, exec, $browser
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8

# Window focus (vim keys)
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

# Window focus (arrow keys)
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Move windows (vim keys)
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d

# Move windows (arrow keys)
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

# Resize windows
binde = $mod CTRL, h, resizeactive, -30 0
binde = $mod CTRL, l, resizeactive, 30 0
binde = $mod CTRL, k, resizeactive, 0 -30
binde = $mod CTRL, j, resizeactive, 0 30
binde = $mod CTRL, left, resizeactive, -30 0
binde = $mod CTRL, right, resizeactive, 30 0
binde = $mod CTRL, up, resizeactive, 0 -30
binde = $mod CTRL, down, resizeactive, 0 30

# Brightness (hardware keys)
binde = , XF86MonBrightnessUp, exec, ~/.local/bin/bitbeast brightness up
binde = , XF86MonBrightnessDown, exec, ~/.local/bin/bitbeast brightness down

# Volume (hardware keys)
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Media keys
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Screenshot (area selection)
bind = $mod, s, exec, grim -g "$(slurp)" - | wl-copy
bind = $mod SHIFT, s, exec, grim - | wl-copy

# Waybar style cycling
bind = $mod SHIFT, w, exec, $bitbeast style cycle

# Lock screen
bind = $mod SHIFT, q, exec, hyprlock || swaylock -f

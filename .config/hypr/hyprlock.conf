    monitor =
    text         = $FAIL
    color        = rgba(ff5d73ff)
    font_size    = 16
    font_family  = JetBrainsMono Nerd Font Bold
    position     = 0, 240
    halign       = center
    valign       = center
    zindex       = 2
}

#───────────────────────────────────────────────────────────────────────────────
# SESSION ACTIONS CARD
#───────────────────────────────────────────────────────────────────────────────
shape {
    monitor =
    size         = 1040, 190
    color        = $surface
    rounding     = 30
    border_size  = 1
    border_color = $line
    position     = 0, 340
    halign       = center
    valign       = center
    zindex       = 1
    shadow_passes = 5
    shadow_size  = 22
    shadow_color = rgba(00000088)
    shadow_boost = 1.2
}

# Glowing top accent bar — session card (glow color)

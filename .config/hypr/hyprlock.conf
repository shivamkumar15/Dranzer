# BitBeast Hyprlock Lockscreen
# Colors injected by the bitbeast lock command
source = ~/.config/hypr/bitbeast-lock-colors.conf

general {
    hide_cursor = false
    immediate_render = true
    text_trim = true
}

background {
    monitor =
    path = $wallpaper_path
    blur_passes = 4
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.5
    vibrancy = 0.18
    vibrancy_darkness = 0.0
}

shape {
    monitor =
    size = 88%, 86%
    color = $panel_soft
    rounding = 28
    border_size = 1
    border_color = $line
    position = 0, 0
    halign = center
    valign = center
    zindex = 0
}

shape {
    monitor =
    size = 760, 210
    color = $panel
    rounding = 26
    border_size = 1
    border_color = $line
    position = 0, 145
    halign = center
    valign = center
    zindex = 1
}

shape {
    monitor =
    size = 980, 170
    color = $surface
    rounding = 30
    border_size = 1
    border_color = $line
    position = 0, 335
    halign = center
    valign = center
    zindex = 1
}

label {
    monitor =
    text = $theme_name
    color = $glow
    font_size = 16
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -330
    halign = center
    valign = center
    zindex = 2
    shadow_passes = 2
    shadow_size = 4
    shadow_color = $panel
}

label {
    monitor =
    text =   $USER
    color = $text_soft
    font_size = 22
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -285
    halign = center
    valign = center
    zindex = 2
    shadow_passes = 2
    shadow_size = 5
    shadow_color = $panel
}

label {
    monitor =
    text = cmd[update:1000] date +"%H"
    color = $glow
    font_size = 136
    font_family = JetBrainsMono Nerd Font Bold
    position = -120, -145
    halign = center
    valign = center
    zindex = 2
    shadow_passes = 4
    shadow_size = 10
    shadow_color = $panel
}

label {
    monitor =
    text = :
    color = $text_soft
    font_size = 126
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -145
    halign = center
    valign = center
    zindex = 2
    shadow_passes = 4
    shadow_size = 10
    shadow_color = $panel
}

label {
    monitor =
    text = cmd[update:1000] date +"%M"
    color = $text
    font_size = 136
    font_family = JetBrainsMono Nerd Font Bold
    position = 120, -145
    halign = center
    valign = center
    zindex = 2
    shadow_passes = 4
    shadow_size = 10
    shadow_color = $panel
}

label {
    monitor =
    text = cmd[update:1000] date +"%A  •  %d %B %Y"
    color = $accent
    font_size = 24
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -55
    halign = center
    valign = center
    zindex = 2
    shadow_passes = 2
    shadow_size = 4
    shadow_color = $panel
}

input-field {
    monitor =
    size = 440, 64
    outline_thickness = 2
    dots_size = 0.18
    dots_spacing = 0.22
    dots_center = true
    outer_color = $line
    inner_color = $surface_alt
    font_color = $text
    fade_on_empty = false
    placeholder_text = <i>Enter password to unlock</i>
    hide_input = false
    rounding = 22
    check_color = $accent
    fail_color = rgba(ff5d73ee)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    capslock_color = $glow
    position = 0, 125
    halign = center
    valign = center
    zindex = 2
    shadow_passes = 2
    shadow_size = 6
    shadow_color = $panel
}

label {
    monitor =
    text = Enter to unlock  •  ESC clears input  •  Click a session action below
    color = $text_dim
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 178
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = $FAIL
    color = rgba(ff5d73ff)
    font_size = 16
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 205
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = Session Controls
    color = $text_dim
    font_size = 18
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 275
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = Layout  •  $LAYOUT
    color = $text_dim
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 395
    halign = center
    valign = center
    zindex = 2
}

shape {
    monitor =
    size = 200, 72
    color = $surface_alt
    rounding = 22
    border_size = 1
    border_color = $line
    position = -315, 335
    halign = center
    valign = center
    zindex = 2
    onclick = ~/.local/bin/bitbeast-session suspend
}

label {
    monitor =
    text = 󰤄  Suspend
    color = $secondary
    font_size = 20
    font_family = JetBrainsMono Nerd Font Bold
    position = -315, 335
    halign = center
    valign = center
    zindex = 3
    onclick = ~/.local/bin/bitbeast-session suspend
}

shape {
    monitor =
    size = 200, 72
    color = $surface_alt
    rounding = 22
    border_size = 1
    border_color = $line
    position = -105, 335
    halign = center
    valign = center
    zindex = 2
    onclick = ~/.local/bin/bitbeast-session logout
}

label {
    monitor =
    text = 󰍃  Logout
    color = $accent
    font_size = 20
    font_family = JetBrainsMono Nerd Font Bold
    position = -105, 335
    halign = center
    valign = center
    zindex = 3
    onclick = ~/.local/bin/bitbeast-session logout
}

shape {
    monitor =
    size = 200, 72
    color = $surface_alt
    rounding = 22
    border_size = 1
    border_color = $line
    position = 105, 335
    halign = center
    valign = center
    zindex = 2
    onclick = ~/.local/bin/bitbeast-session restart
}

label {
    monitor =
    text = 󰜉  Restart
    color = $primary
    font_size = 20
    font_family = JetBrainsMono Nerd Font Bold
    position = 105, 335
    halign = center
    valign = center
    zindex = 3
    onclick = ~/.local/bin/bitbeast-session restart
}

shape {
    monitor =
    size = 200, 72
    color = $surface_alt
    rounding = 22
    border_size = 1
    border_color = rgba(ff5d7370)
    position = 315, 335
    halign = center
    valign = center
    zindex = 2
    onclick = ~/.local/bin/bitbeast-session shutdown
}

label {
    monitor =
    text =   Shutdown
    color = rgba(ff5d73ff)
    font_size = 20
    font_family = JetBrainsMono Nerd Font Bold
    position = 315, 335
    halign = center
    valign = center
    zindex = 3
    onclick = ~/.local/bin/bitbeast-session shutdown
}

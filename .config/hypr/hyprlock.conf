# BitBeast Hyprlock Lockscreen — Enhanced Edition
# Cinematic animations · Colored glow buttons · Accent top-bars
# Colors injected dynamically by `bitbeast lock`
source = ~/.config/hypr/bitbeast-lock-colors.conf

general {
    hide_cursor    = false
    immediate_render = true
    text_trim      = true
}

#───────────────────────────────────────────────────────────────────────────────
# ANIMATION SYSTEM
# Five bezier curves covering different motion feels.
# All animation channels are explicitly tuned for maximum visual impact.
#───────────────────────────────────────────────────────────────────────────────
animations {
    enabled = true

    # ── Bezier library ───────────────────────────────────────────────────────
    bezier = lockEase,    0.22,  1.00,  0.36, 1.00   # smooth deceleration
    bezier = lockSnap,    0.16,  1.00,  0.30, 1.00   # crisp fast settle
    bezier = lockFloat,   0.34,  1.56,  0.64, 1.00   # elastic overshoot
    bezier = lockBounce,  0.68, -0.55,  0.27, 1.55   # springy bounce
    bezier = lockCinema,  0.05,  0.70,  0.10, 1.00   # slow cinematic reveal

    # ── Screen entrance / exit ───────────────────────────────────────────────
    animation = fadeIn,           1, 10.0, lockCinema  # slow dramatic reveal
    animation = fadeOut,          1,  3.0, lockSnap    # crisp exit

    # ── Input field ──────────────────────────────────────────────────────────
    animation = inputFieldColors, 1,  8.0, lockEase    # smooth color cycling
    animation = inputFieldFade,   1,  3.5, lockEase    # fade-on-empty
    animation = inputFieldWidth,  1,  5.0, lockFloat   # elastic width expand
    animation = inputFieldDots,   1,  4.0, lockFloat   # dot pop-in animation
}

#───────────────────────────────────────────────────────────────────────────────
# BACKGROUND
#───────────────────────────────────────────────────────────────────────────────
background {
    monitor =
    path            = $wallpaper_path
    blur_passes     = 4
    blur_size       = 8
    noise           = 0.0117
    contrast        = 0.8916
    brightness      = 0.5
    vibrancy        = 0.20
    vibrancy_darkness = 0.0
}

#───────────────────────────────────────────────────────────────────────────────
# OUTER FROSTED GLASS PANEL (full-screen backdrop)
#───────────────────────────────────────────────────────────────────────────────
shape {
    monitor =
    size         = 88%, 88%
    color        = $panel_soft
    rounding     = 30
    border_size  = 1
    border_color = $line
    position     = 0, 0
    halign       = center
    valign       = center
    zindex       = 0
}

#───────────────────────────────────────────────────────────────────────────────
# CLOCK + USER CARD
#───────────────────────────────────────────────────────────────────────────────
shape {
    monitor =
    size         = 800, 320
    color        = $panel
    rounding     = 30
    border_size  = 1
    border_color = $line
    position     = 0, -70
    halign       = center
    valign       = center
    zindex       = 1
    shadow_passes = 6
    shadow_size  = 30
    shadow_color = rgba(00000099)
    shadow_boost = 1.5
}

# Glowing top accent bar — clock card (glow color, y=70 is near the panel top)
shape {
    monitor =
    size         = 560, 3
    color        = $glow
    rounding     = 2
    border_size  = 0
    position     = 0, 70
    halign       = center
    valign       = center
    zindex       = 2
    shadow_passes = 4
    shadow_size  = 14
    shadow_color = $line
    shadow_boost = 2.5
}

# Theme name badge (e.g. DRANZER)
label {
    monitor =
    text         = $theme_name
    color        = $glow
    font_size    = 16
    font_family  = JetBrainsMono Nerd Font Bold
    position     = 0, 86
    halign       = center
    valign       = center
    zindex       = 2
    shadow_passes = 2
    shadow_size  = 4
    shadow_color = $panel
}

# Username
label {
    monitor =
    text         = $USER
    color        = $text
    font_size    = 30
    font_family  = JetBrainsMono Nerd Font Bold
    position     = 0, 58
    halign       = center
    valign       = center
    zindex       = 2
    shadow_passes = 2
    shadow_size  = 5
    shadow_color = $panel
}

# Big clock (updates every second)
label {
    monitor =
    text         = cmd[update:1000] date +"%H:%M"
    color        = $text
    font_size    = 152
    font_family  = JetBrainsMono Nerd Font Bold
    position     = 0, -18
    halign       = center
    valign       = center
    zindex       = 2
    shadow_passes = 5
    shadow_size  = 14
    shadow_color = $panel
    shadow_boost = 1.4
}

# Date label
label {
    monitor =
    text         = cmd[update:1000] date +"%A  •  %d %B %Y"
    color        = $text_soft
    font_size    = 22
    font_family  = JetBrainsMono Nerd Font Bold
    position     = 0, -145
    halign       = center
    valign       = center
    zindex       = 2
    shadow_passes = 2
    shadow_size  = 4
    shadow_color = $panel
}

# LOCKED status badge
label {
    monitor =
    text         = ●  LOCKED
    color        = $accent
    font_size    = 18
    font_family  = JetBrainsMono Nerd Font Bold
    position     = 0, -195
    halign       = center
    valign       = center
    zindex       = 2
    shadow_passes = 3
    shadow_size  = 8
    shadow_color = $panel
    shadow_boost = 1.4
}

#───────────────────────────────────────────────────────────────────────────────
# PASSWORD CARD
#───────────────────────────────────────────────────────────────────────────────
shape {
    monitor =
    size         = 800, 170
    color        = $surface
    rounding     = 28
    border_size  = 1
    border_color = $line
    position     = 0, 150
    halign       = center
    valign       = center
    zindex       = 1
    shadow_passes = 5
    shadow_size  = 20
    shadow_color = rgba(00000088)
    shadow_boost = 1.3
}

# Glowing top accent bar — password card (accent color)
shape {
    monitor =
    size         = 400, 3
    color        = $accent
    rounding     = 2
    border_size  = 0
    position     = 0, 232
    halign       = center
    valign       = center
    zindex       = 2
    shadow_passes = 4
    shadow_size  = 12
    shadow_color = $accent_soft
    shadow_boost = 2.5
}

# PASSWORD section caption
label {
    monitor =
    text         = PASSWORD
    color        = $accent
    font_size    = 16
    font_family  = JetBrainsMono Nerd Font Bold
    position     = 0, 120
    halign       = center
    valign       = center
    zindex       = 2
}

# Input field with pango-styled placeholder
input-field {
    monitor =
    size             = 520, 68
    outline_thickness = 2
    dots_size        = 0.22
    dots_spacing     = 0.24
    dots_center      = true
    dots_rounding    = -1
    outer_color      = $accent
    inner_color      = $surface_alt
    font_color       = $text
    font_family      = JetBrainsMono Nerd Font Bold
    fade_on_empty    = false
    placeholder_text = <i>  Enter password...</i>
    hide_input       = true
    rounding         = 22
    check_color      = $primary
    check_text       = <i>Authenticating...</i>
    fail_color       = rgba(ff5d73ff)
    fail_text        = <i>✗  Wrong password, retry</i>
    capslock_color   = $secondary
    swap_font_color  = false
    position         = 0, 152
    halign           = center
    valign           = center
    zindex           = 2
    shadow_passes    = 5
    shadow_size      = 18
    shadow_color     = rgba(000000bb)
    shadow_boost     = 1.4
}

# Keyboard hint
label {
    monitor =
    text         = Press ENTER to unlock  •  ESC clears input
    color        = $text_dim
    font_size    = 16
    font_family  = JetBrainsMono Nerd Font
    position     = 0, 214
    halign       = center
    valign       = center
    zindex       = 2
}

# Auth failure reason

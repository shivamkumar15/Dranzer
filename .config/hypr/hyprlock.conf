# BitBeast Hyprlock Lockscreen
# Colors injected by the bitbeast lock command
source = ~/.config/hypr/bitbeast-lock-colors.conf

general {
    hide_cursor = false
    immediate_render = true
    text_trim = true
}

animations {
    enabled = true
    bezier = lockEase, 0.22, 1, 0.36, 1
    bezier = lockSnap, 0.16, 1, 0.3, 1
    bezier = lockFloat, 0.34, 1.56, 0.64, 1
    animation = fadeIn, 1, 5.2, lockEase
    animation = fadeOut, 1, 3.2, lockSnap
    animation = inputFieldColors, 1, 6, lockEase
    animation = inputFieldFade, 1, 2.8, lockEase
    animation = inputFieldWidth, 1, 4.2, lockFloat
}

background {
    monitor =
    path = $wallpaper_path
    blur_passes = 4
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.5
    vibrancy = 0.18
    vibrancy_darkness = 0.0
}

shape {
    monitor =
    size = 88%, 88%
    color = $panel_soft
    rounding = 30
    border_size = 1
    border_color = $line
    position = 0, 0
    halign = center
    valign = center
    zindex = 0
}

shape {
    monitor =
    size = 800, 320
    color = $panel
    rounding = 30
    border_size = 1
    border_color = $line
    position = 0, -70
    halign = center
    valign = center
    zindex = 1
    shadow_passes = 4
    shadow_size = 20
    shadow_color = rgba(00000088)
}

shape {
    monitor =
    size = 800, 170
    color = $surface
    rounding = 28
    border_size = 1
    border_color = $line
    position = 0, 150
    halign = center
    valign = center
    zindex = 1
    shadow_passes = 4
    shadow_size = 18
    shadow_color = rgba(00000088)
}

shape {
    monitor =
    size = 1040, 190
    color = $surface
    rounding = 30
    border_size = 1
    border_color = $line
    position = 0, 340
    halign = center
    valign = center
    zindex = 1
    shadow_passes = 4
    shadow_size = 20
    shadow_color = rgba(00000088)
}

label {
    monitor =
    text = LOCKED
    color = $accent
    font_size = 18
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -195
    halign = center
    valign = center
    zindex = 2
    shadow_passes = 2
    shadow_size = 4
    shadow_color = $panel
}

label {
    monitor =
    text = cmd[update:1000] date +"%A  •  %d %B %Y"
    color = $text_soft
    font_size = 22
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -145
    halign = center
    valign = center
    zindex = 2
    shadow_passes = 2
    shadow_size = 4
    shadow_color = $panel
}

label {
    monitor =

# ─── BitBeast Hyprlock — Aesthetic Edition ────────────────────────────────────
# Modern, minimalist layout with blurred background and glassmorphism elements.
# Colors and assets injected via `bitbeast-lock-colors.conf`.

source = ~/.config/hypr/bitbeast-lock-colors.conf

general {
    hide_cursor      = false
    immediate_render = true
    text_trim        = true
}

# ── Animations ────────────────────────────────────────────────────────────────
animations {
    enabled = true
    bezier = sharp, 0.05, 0.9, 0.1, 1.05
    bezier = smooth, 0.25, 1.0, 0.35, 1.0
    
    animation = fadeIn,          1, 5.0, smooth
    animation = fadeOut,         1, 3.0, smooth
    animation = inputFieldFade,  1, 4.0, sharp
    animation = inputFieldWidth, 1, 4.0, sharp
    animation = inputFieldDots,  1, 3.0, smooth
}

# ── Background ────────────────────────────────────────────────────────────────
background {
    monitor =
    path              = $wallpaper_path
    blur_passes       = 4
    blur_size         = 8
    noise             = 0.01
    contrast          = 0.9
    brightness        = 0.5
    vibrancy          = 0.2
}

# ── Day of Week ───────────────────────────────────────────────────────────────
label {
    monitor =
    text         = cmd[update:1000] date +"%A"
    color        = $text
    font_size    = 84
    font_family  = JetBrainsMono Nerd Font Bold
    position     = 0, 320
    halign       = center
    valign       = center
    zindex       = 1
    shadow_passes = 2
    shadow_size   = 8
    shadow_color  = rgba(00000066)
}

# ── Date ──────────────────────────────────────────────────────────────────────
label {
    monitor =
    text         = cmd[update:1000] date +"%d %B"
    color        = $text_soft
    font_size    = 32
    font_family  = JetBrainsMono Nerd Font SemiBold
    position     = 0, 240
    halign       = center
    valign       = center
    zindex       = 1
}

# ── Time ──────────────────────────────────────────────────────────────────────
label {
    monitor =
    text         = cmd[update:1000] date +" - %H:%M - "
    color        = $text_dim
    font_size    = 18
    font_family  = JetBrainsMono Nerd Font
    position     = 0, 190
    halign       = center
    valign       = center
    zindex       = 1
}

# ── Profile Avatar ───────────────────────────────────────────────────────────
image {
    monitor =
    path = $avatar_path
    size = 120
    rounding = -1
    border_size = 2
    border_color = $accent
    position = 0, 60
    halign = center
    valign = center
    zindex = 2
}

# ── Username Pill ────────────────────────────────────────────────────────────
shape {
    monitor =
    size = 280, 48
    color = rgba(00000044)
    rounding = 24
    border_size = 1
    border_color = rgba(ffffff11)
    position = 0, -40
    halign = center
    valign = center
    zindex = 1
}

label {
    monitor =
    text =   $user_display_name
    color = $text_soft
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -40
    halign = center
    valign = center
    zindex = 2
}

# ── Password Field ───────────────────────────────────────────────────────────
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(ffffff11)
    inner_color = rgba(00000044)
    font_color = $text
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 24
    check_color = $accent
    fail_color = rgba(ff5555ff)
    fail_text = <i>Incorrect</i>
    position = 0, -100
    halign = center
    valign = center
    zindex = 2
}

# ── Power Menu ────────────────────────────────────────────────────────────────
label {
    monitor =
    text = 󰐥
    color = $text_dim
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = -80, 60
    halign = center
    valign = bottom
    zindex = 1
    onclick = systemctl poweroff
}

label {
    monitor =
    text = 󰜉
    color = $text_dim
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, 60
    halign = center
    valign = bottom
    zindex = 1
    onclick = systemctl reboot
}

label {
    monitor =
    text = 󰒲
    color = $text_dim
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 80, 60
    halign = center
    valign = bottom
    zindex = 1
    onclick = systemctl suspend
}

# ── Theme Badge ──────────────────────────────────────────────────────────────
label {
    monitor =
    text = $theme_name
    color = $text_dim
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 0, 20
    halign = center
    valign = bottom
    zindex = 1
}

# BitBeast Hyprlock Lockscreen
# Colors injected by the bitbeast lock command
source = ~/.config/hypr/bitbeast-lock-colors.conf

background {
    monitor =
    path = $wallpaper_path
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.6
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# HUGE HOUR
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H")</b>"
    color = $glow
    font_size = 200
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 180
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 10
    shadow_color = $bg
}

# HUGE MINUTE
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%M")</b>"
    color = rgb($text)
    font_size = 200
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -80
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 10
    shadow_color = $bg
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%A"), <span foreground='##$glow_alpha'>$(date +"%d %B")</span></b>"
    color = rgb($text)
    font_size = 30
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -280
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 5
    shadow_color = $bg
}

# USER ICON (Generic Contact Icon)
label {
    monitor =
    text = 
    color = rgb($text)
    font_size = 50
    font_family = JetBrainsMono Nerd Font
    position = 0, -350
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 5
    shadow_color = $bg
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(255, 255, 255, 0.05)
    font_color = rgb($text)
    fade_on_empty = false
    placeholder_text = <i>Hi, $USER</i>
    hide_input = false
    position = 0, -450
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 5
    shadow_color = $bg
}

# MUSIC PLAYER
label {
    monitor =
    text = cmd[update:1000] echo "$(playerctl metadata --format '{{title}}  🎧  {{artist}}' 2>/dev/null)"
    color = rgb($text)
    font_size = 18
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 50
    halign = center
    valign = bottom
    shadow_passes = 2
    shadow_size = 5
    shadow_color = $bg
}

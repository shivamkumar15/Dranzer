#───────────────────────────────────────────────────────────────────────────────
# SESSION BUTTONS
# Each button = outer neon-glow frame + inner solid card + icon + name + subtitle
# The shadow_boost on each outer frame drives the colored glow halo effect.
#───────────────────────────────────────────────────────────────────────────────

# ─── SUSPEND ─────────────────────────────────────────────────────────────────
shape {
    monitor =
    size         = 218, 114
    color        = rgba(ffffff05)
    rounding     = 26
    border_size  = 2
    border_color = $secondary
    position     = -360, 350
    halign       = center
    valign       = center
    zindex       = 2
    shadow_passes = 6
    shadow_size  = 28
    shadow_color = $secondary_soft
    shadow_boost = 2.2
}
shape {
    monitor =
    size         = 200, 96
    color        = $surface_alt
    rounding     = 22
    border_size  = 1
    border_color = $secondary
    position     = -360, 350
    halign       = center
    valign       = center
    zindex       = 2
    onclick      = ~/.local/bin/bitbeast-session suspend
}

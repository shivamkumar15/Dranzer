# BitBeast Hyprlock Lockscreen
# Colors injected by the bitbeast lock command
source = ~/.config/hypr/bitbeast-lock-colors.conf

general {
    hide_cursor = false
    immediate_render = true
    text_trim = true
}

animations {
    enabled = true
    bezier = lockEase, 0.22, 1, 0.36, 1
    bezier = lockSnap, 0.16, 1, 0.3, 1
    bezier = lockLinear, 1, 1, 0, 0
    animation = fadeIn, 1, 4.5, lockEase
    animation = fadeOut, 1, 3, lockSnap
    animation = inputFieldColors, 1, 5, lockSnap
    animation = inputFieldFade, 1, 2.5, lockEase
    animation = inputFieldWidth, 1, 3.5, lockSnap
    animation = inputFieldDots, 1, 2, lockLinear
}

background {
    monitor =
    path = $wallpaper_path
    blur_passes = 4
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.5
    vibrancy = 0.18
    vibrancy_darkness = 0.0
}

shape {
    monitor =
    size = 88%, 86%
    color = $panel_soft
    rounding = 28
    border_size = 1
    border_color = $line
    position = 0, 0
    halign = center
    valign = center
    zindex = 0
}

shape {
    monitor =
    size = 760, 210
    color = $panel
    rounding = 26
    border_size = 1
    border_color = $line
    position = 0, 145
    halign = center
    valign = center
    zindex = 1
    shadow_passes = 4
    shadow_size = 18
    shadow_color = rgba(00000088)
}

shape {
    monitor =
    size = 980, 170
    color = $surface
    rounding = 30
    border_size = 1
    border_color = $line
    position = 0, 335
    halign = center
    valign = center
    zindex = 1
    shadow_passes = 4
    shadow_size = 20
    shadow_color = rgba(00000088)
}

label {
    monitor =
    text = $theme_name
    color = $glow
    font_size = 16
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -330
    halign = center
    valign = center
    zindex = 2
    shadow_passes = 2
    shadow_size = 4
    shadow_color = $panel
}

label {
    monitor =
    text =   $USER
    color = $text_soft
    font_size = 22
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -285
    halign = center
    valign = center
    zindex = 2
    shadow_passes = 2
    shadow_size = 5
    shadow_color = $panel
}

label {
    monitor =
    text = cmd[update:1000] date +"%H"
    color = $glow
    font_size = 136
    font_family = JetBrainsMono Nerd Font Bold
    position = -120, -145
    halign = center
    valign = center
    zindex = 2
    shadow_passes = 4
    shadow_size = 10
    shadow_color = $panel
}

label {
    monitor =
    text = :
    color = $text_soft
    font_size = 126
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -145
    halign = center
    valign = center
    zindex = 2
    shadow_passes = 4
    shadow_size = 10
    shadow_color = $panel
}

label {
    monitor =
    text = cmd[update:1000] date +"%M"
    color = $text
    font_size = 136
    font_family = JetBrainsMono Nerd Font Bold
    position = 120, -145
    halign = center
    valign = center
    zindex = 2
    shadow_passes = 4
    shadow_size = 10
    shadow_color = $panel
}

label {
    monitor =
    text = cmd[update:1000] date +"%A  •  %d %B %Y"
    color = $accent
    font_size = 24
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -55
    halign = center
    valign = center
    zindex = 2
    shadow_passes = 2
    shadow_size = 4
    shadow_color = $panel
}

input-field {
    monitor =
    size = 440, 64
    outline_thickness = 3
    dots_size = 0.22
    dots_spacing = 0.28
    dots_center = true
    dots_rounding = -2
    outer_color = $glow $accent 45deg
    inner_color = $surface_alt
    font_color = $text
    font_family = JetBrainsMono Nerd Font Bold
    fade_on_empty = true
    fade_timeout = 2200
    placeholder_text = <i>Enter password to unlock</i>
    hide_input = false
    rounding = 22
    check_color = $accent $glow 0deg
    check_text = <i>Authenticating...</i>
    fail_color = rgba(ff5d73ee) rgba(ff9aa8ee) 0deg
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    capslock_color = $secondary $glow 0deg
    swap_font_color = true
    position = 0, 125
    halign = center
    valign = center
    zindex = 2
    shadow_passes = 4
    shadow_size = 16
    shadow_color = rgba(000000aa)
}

label {
    monitor =
    text = Type to wake the field  •  ESC clears input
    color = $text_dim
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 178
    halign = center
    valign = center
    zindex = 2
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(00000099)
}


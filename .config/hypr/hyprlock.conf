    halign = center
    valign = center
    zindex = 2
}

input-field {
    monitor =
    size = 520, 68
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.24
    dots_center = true
    dots_rounding = -1
    outer_color = $accent
    inner_color = $surface_alt
    font_color = $text
    font_family = JetBrainsMono Nerd Font Bold
    fade_on_empty = false
    placeholder_text = Enter password
    hide_input = true
    rounding = 22
    check_color = $primary
    check_text = Authenticating
    fail_color = rgba(ff5d73ff)
    fail_text = Retry
    capslock_color = $secondary
    swap_font_color = false
    position = 0, 152
    halign = center
    valign = center
    zindex = 2
    shadow_passes = 3
    shadow_size = 14
    shadow_color = rgba(000000aa)
}

label {
    monitor =

# ─── BitBeast Hyprlock — Minimal Edition ─────────────────────────────────────
# Clean, simple lockscreen. Colors injected by `bitbeast lock`.
source = ~/.config/hypr/bitbeast-lock-colors.conf

general {
    hide_cursor      = true
    immediate_render = true
    text_trim        = true
}

# ── Animations ────────────────────────────────────────────────────────────────
animations {
    enabled = true

    bezier = smooth,  0.25, 1.0, 0.35, 1.0
    bezier = gentle,  0.40, 0.0, 0.20, 1.0

    animation = fadeIn,           1, 6.0, smooth
    animation = fadeOut,          1, 3.0, gentle
    animation = inputFieldFade,   1, 3.0, smooth
    animation = inputFieldWidth,  1, 4.0, smooth
    animation = inputFieldDots,   1, 3.0, gentle
    animation = inputFieldColors, 1, 5.0, smooth
}

# ── Background ────────────────────────────────────────────────────────────────
background {
    monitor =
    path              = $wallpaper_path
    blur_passes       = 5
    blur_size         = 10
    noise             = 0.012
    contrast          = 0.85
    brightness        = 0.45
    vibrancy          = 0.15
    vibrancy_darkness = 0.0
}

# ── Dim overlay — adds depth without a visible panel ─────────────────────────
shape {
    monitor =
    size         = 100%, 100%
    color        = rgba(00000055)
    rounding     = 0
    border_size  = 0
    position     = 0, 0
    halign       = center
    valign       = center
    zindex       = 0
}

# ── Time ──────────────────────────────────────────────────────────────────────
label {
    monitor =
    text         = cmd[update:1000] date +"%H:%M"
    color        = $text
    font_size    = 140
    font_family  = JetBrainsMono Nerd Font Bold
    position     = 0, -80
    halign       = center
    valign       = center
    zindex       = 1
    shadow_passes = 3
    shadow_size  = 12
    shadow_color = rgba(00000088)
}

# ── Date ──────────────────────────────────────────────────────────────────────
label {
    monitor =
    text         = cmd[update:60000] date +"%A, %d %B"
    color        = $text_soft
    font_size    = 22
    font_family  = JetBrainsMono Nerd Font
    position     = 0, -160
    halign       = center
    valign       = center
    zindex       = 1
    shadow_passes = 2
    shadow_size  = 6
    shadow_color = rgba(00000066)
}

# ── Thin accent divider ──────────────────────────────────────────────────────
shape {
    monitor =
    size         = 280, 2
    color        = $accent
    rounding     = 1
    border_size  = 0
    position     = 0, -190
    halign       = center
    valign       = center
    zindex       = 1
    shadow_passes = 2
    shadow_size  = 8
    shadow_color = $accent_soft
}

# ── Greeting ──────────────────────────────────────────────────────────────────
label {
    monitor =
    text         = Hi, $USER
    color        = $text_dim
    font_size    = 16
    font_family  = JetBrainsMono Nerd Font
    position     = 0, -218
    halign       = center
    valign       = center
    zindex       = 1
}

# ── Password input ───────────────────────────────────────────────────────────
input-field {
    monitor =
    size              = 340, 52
    outline_thickness = 2
    dots_size         = 0.25
    dots_spacing      = 0.22
    dots_center       = true
    dots_rounding     = -1
    outer_color       = $accent
    inner_color       = rgba(00000044)
    font_color        = $text
    font_family       = JetBrainsMono Nerd Font
    fade_on_empty     = false
    placeholder_text  = <i>  Password</i>
    hide_input        = true
    rounding          = 26
    check_color       = $primary
    check_text        = <i>Unlocking…</i>
    fail_color        = rgba(ff5d73ff)
    fail_text         = <i>Try again</i>
    capslock_color    = $secondary
    swap_font_color   = false
    position          = 0, -270
    halign            = center
    valign            = center
    zindex            = 1
    shadow_passes     = 2
    shadow_size       = 10
    shadow_color      = rgba(00000066)
}

# ── Fail message ─────────────────────────────────────────────────────────────
label {
    monitor =
    text         = $FAIL
    color        = rgba(ff5d73ff)
    font_size    = 14
    font_family  = JetBrainsMono Nerd Font
    position     = 0, -310
    halign       = center
    valign       = center
    zindex       = 1
}

# ── Theme badge — bottom of screen ───────────────────────────────────────────
label {
    monitor =
    text         = $theme_name
    color        = $text_dim
    font_size    = 12
    font_family  = JetBrainsMono Nerd Font
    position     = 0, 30
    halign       = center
    valign       = bottom
    zindex       = 1
}

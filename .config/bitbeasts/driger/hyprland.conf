general {
    border_size = 3
    col.active_border = $accent $primary 30deg
    col.inactive_border = $secondary
}

decoration {
    rounding = 10
    active_opacity = 0.98
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = $bg
    }
}

group {
    col.border_active = $accent
    col.border_inactive = $secondary
}

general {
    border_size = 4
    col.active_border = $accent $primary 20deg
    col.inactive_border = $secondary
}

decoration {
    rounding = 6
    active_opacity = 0.97
    inactive_opacity = 0.94

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = $bg
    }
}

group {
    col.border_active = $accent
    col.border_inactive = $secondary
}
